name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install render tools
        run: sudo apt-get install -y pandoc
      - name: Render downloads in CI
        run: uv run scripts/render_downloads.py
      - name: Import a work in CI (dotted module form)
        run: uv run python -m scripts.lib.writer
      - name: Lower IR in CI (library module path form)
        run: uv run scripts/lib/ir_lower.py
      - name: Build
        run: npm run build
