name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install render tools
        run: sudo apt-get install -y pandoc
      - name: Render downloads in CI
        run: uv run pancratius downloads render
      - name: Import a work in CI despite uv flags
        run: uv run --frozen --quiet pancratius work import source.docx --kind book --lang ru
      - name: Optimize via CLI module
        run: uv run python -m pancratius.cli docx optimize
      - name: Render via CLI file path
        run: uv run python pancratius/cli.py downloads render
      - name: Import a work in CI (dotted module form)
        run: uv run python -m pancratius.writer
      - name: Lower IR in CI (library module path form)
        run: uv run pancratius/ir/lower.py
      - name: Build
        run: npm run build
