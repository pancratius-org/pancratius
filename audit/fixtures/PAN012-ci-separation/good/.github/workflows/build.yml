name: Build
# IMPORTANT: this workflow installs Node + uv only. It MUST NOT install pandoc
# or typst, and MUST NOT run `pancratius downloads render` — that is local-only. This
# comment names the banned tooling on purpose: the rule must NOT match comments.
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
      - uses: astral-sh/setup-uv@v8
      - run: npm ci
      - name: Build site
        run: npm run build
