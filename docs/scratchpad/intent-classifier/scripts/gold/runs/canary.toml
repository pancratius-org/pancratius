# Canary: validate the full production path (v5 brief → conf-bearing reps → gate → queues →
# audit → manifest) on a small set of KNOWN, mixed phaseb regions, before any scale-up. Because
# we already have intuition for these regions, bad routing or odd accept/human counts stand out.
name = "canary"
description = "full-loop validation on 10 known mixed-stratum phaseb regions"
dataset = "phaseb"
prefix = "canary"
brief = "data/phaseb/reader_brief_v5.txt"
notes = "control run, not dataset growth — expand to a new stratified sample only if this is clean"

[panel]
core = ["grok", "gemini-pro", "ds-flash-text"]   # acceptance gate; grok leads
diagnostic = ["glm"]                              # run alongside, NOT in the gate
reps_initial = 1                                  # adaptive 1→3: start at 1, escalate only where needed
reps_cap = 3

[gates]
conf_floor = 0.7
min_agree = 2          # ≥2/3 core must share the majority
escalate_reps = 3

[audit]
rate = 0.08            # 8% of accepted, prose-biased + stratified
seed = 7
prose_bias = 2.0

[regions]
# a deliberate mix: easy prose · easy/contrast lineated · lineated-prose · prior-dependent
rids = [
  "g10_b19",      # wrap_prose  — easy prose (guardrail)
  "g24_b28",      # wrap_prose  — easy prose (guardrail)
  "g23_b17",      # wrap_prose  — prose (held-out anchor)
  "g04_b73",      # hardbreak   — easy lineated (litany)
  "g14_b07",      # hardbreak   — lineated (contrast)
  "g08_b55_t0",   # mid_gap     — lineated (cadence)
  "g00_b64_t2",   # mid_gap     — lineated-prose (prose broken for emphasis)
  "g29_b69_t0",   # mid_gap     — lineated-prose
  "p00_b06",      # wrap_prose  — prior-dependent (soft)
  "p04_b33",      # wrap_prose  — prior-dependent (soft)
]

[flags]
soft = "scripts/gold/runs/canary.soft.json"   # p00_b06 + p04_b33 lines → route to human
# needs_review = "..."                  # wire when the substrate mask flags lines for this set
