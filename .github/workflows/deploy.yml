name: Build and deploy to hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: "npm"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - run: npm ci

      - name: Build Astro site (includes astro check and pagefind index)
        run: npm run build

      - name: Verify build produced HTML
        run: |
          html_count=$(find dist -name '*.html' | wc -l)
          if [ "$html_count" -lt 1 ]; then
            echo "::error::Astro build produced no HTML pages; refusing to deploy an empty site."
            exit 1
          fi
          echo "ok: $html_count html files in dist/"

      - name: Deploy to hosting via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ vars.HOSTING_FTP_HOST }}
          username: ${{ secrets.HOSTING_FTP_USER }}
          password: ${{ secrets.HOSTING_FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ${{ vars.HOSTING_FTP_PATH }}
          protocol: ${{ vars.HOSTING_FTP_PROTOCOL || 'ftps' }}
          security: loose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
          log-level: standard
