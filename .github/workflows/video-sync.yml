name: Sync videos

# Weekly poll of Sergey's YouTube channels via the Data API v3. Runs
# `uv run pancratius video sync`, verifies the site still passes the full
# local gate with the new scaffolds, opens (or updates) `bot/video-sync` PR,
# then enables auto-merge.
#
# NOTE on the Local-vs-CI rule (docs/architecture.md): CI never imports DOCX,
# renders PDF/EPUB, optimizes DOCX, or regenerates embeddings. This workflow
# is the documented exception: it runs `pancratius video sync` inside CI because
# the work is external-API ingestion — a YouTube poll plus one OpenRouter call
# per new video that splits the raw description into a clean hook + reading body
# (docs/tooling.md → "video sync"). Both are lightweight HTTP calls, not the
# heavy local toolchains (typst/pandoc/MLX) the rule keeps out of CI. It imports
# no documents and renders no artifacts. If `OPENROUTER_API_KEY` is unset the
# split degrades to its deterministic fallback and the sync still succeeds.
#
# One-time setup in repo settings:
#   1. Secrets and variables → Actions → New secrets: `YOUTUBE_API_KEY` and
#      `OPENROUTER_API_KEY`.
#   2. General → Pull Requests → enable "Allow auto-merge".
#   3. If branch protection requires reviewers on main, add a bypass for the
#      `github-actions[bot]` author or drop the requirement for this branch.
#
# A content gate (checks + audit + build) runs INSIDE this workflow so the PR is
# opened only after the new videos validate, pass the audit, and build clean.
# Auto-merge can then fire with no extra required checks. PRs triggered by the
# default GITHUB_TOKEN do not re-run pr.yml, which is why we gate here instead of
# relying on PR checks.

on:
  schedule:
    - cron: "0 9 * * *"   # daily, 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: video-sync
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python deps (frozen lock)
        run: uv sync --frozen

      - name: Scan YouTube channels and draft new video descriptions
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run --frozen pancratius video sync

      - name: Stop early if nothing changed
        id: diff
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new videos; skipping the content gate + PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --short
          fi

      - name: Install npm dependencies
        # Only the content gate needs npm; the scan is Python-only.
        if: steps.diff.outputs.changed == 'true'
        run: npm ci

      - name: Verify the new content
        # Type/schema checks, the architectural audit (PAN028 guards the hooks),
        # and a clean build — enough to prove the scaffolded videos are valid and
        # render. Not the full `verify`: a new video can't affect the Playwright
        # e2e/visual suite, so it is skipped to save CI minutes and a browser
        # download. If any check fails the PR is never opened.
        if: steps.diff.outputs.changed == 'true'
        run: npm run check && npm run audit:repo && npm run build

      - name: Open or update PR
        if: steps.diff.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: bot/video-sync
          delete-branch: true
          commit-message: "feat(content): sync new videos"
          title: "feat(content): sync new videos"
          body: |
            Automated by `.github/workflows/video-sync.yml`.

            Content checks, the audit, and a clean build passed inside the
            workflow before this PR was opened, so it should auto-merge as soon
            as GitHub clears it.

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
