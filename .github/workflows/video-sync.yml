name: Sync videos

# Scaffolds newly published videos. `pancratius video sync` reads the configured
# YouTube channels and makes one OpenRouter call per new video to split the raw
# description into a hook + reading body; the content gate below runs before the
# auto-merging PR opens (a GITHUB_TOKEN PR would not re-trigger pr.yml).
#
# This is the one `pancratius` command that runs in CI — the documented exception
# to the Local-vs-CI rule (docs/architecture.md) — because it is external-API
# ingestion, not a local DOCX/PDF/EPUB toolchain: it imports no documents and
# renders no artifacts. Without OPENROUTER_API_KEY the split falls back to a
# deterministic clean-and-strip.

on:
  schedule:
    - cron: "0 9 * * *"   # daily, 09:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: video-sync
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install Python deps (frozen lock)
        run: uv sync --frozen

      - name: Scan YouTube channels and draft new video descriptions
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: uv run --frozen pancratius video sync

      - name: Stop early if nothing changed
        id: diff
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No new videos; skipping the content gate + PR."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git status --short
          fi

      - name: Install npm dependencies
        # Only the content gate needs npm; the scan is Python-only.
        if: steps.diff.outputs.changed == 'true'
        run: npm ci

      - name: Verify the new content
        # Type/schema checks, the architectural audit (PAN028 guards the hooks),
        # and a clean build — enough to prove the scaffolded videos are valid and
        # render. Not the full `verify`: a new video can't affect the Playwright
        # e2e/visual suite, so it is skipped to save CI minutes and a browser
        # download. If any check fails the PR is never opened.
        if: steps.diff.outputs.changed == 'true'
        run: npm run check && npm run audit:repo && npm run build

      - name: Open or update PR
        if: steps.diff.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          branch: bot/video-sync
          delete-branch: true
          commit-message: "feat(content): sync new videos"
          title: "feat(content): sync new videos"
          body: |
            Automated by `.github/workflows/video-sync.yml`.

            Content checks, the audit, and a clean build passed inside the
            workflow before this PR was opened, so it should auto-merge as soon
            as GitHub clears it.

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
