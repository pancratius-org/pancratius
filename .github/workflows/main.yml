name: Build and deploy

# Push-to-main pipeline. Builds ONCE, audits ONCE, deploys to both targets.
#
# Design: a single job, not artifact-passed fan-out. The built `dist/` is
# ~800 MB; uploading and re-downloading it as an artifact is roughly the
# same wall clock as rebuilding, costs storage quota, and adds a transfer
# failure mode. So: keep the artifact in-process and run the two deploys
# sequentially in the same runner.
#
# Failure semantics:
#   - Check, build, or audit failure aborts before any deploy is attempted
#     (correct; never ship an invalid site).
#   - Once the deploy gate is reached, one host failing does NOT block the
#     other. Single-target failure is still reported by the final deploy
#     outcome step; rerun via `workflow_dispatch`.
#
# IMPORTANT: this workflow installs Node + uv only. It MUST NOT install
# pandoc or typst — CI never renders documents (see docs/downloads.md).

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize main-branch deploys. cancel-in-progress=false because cancelling
# mid-deploy can leave the host in a partial state.
concurrency:
  group: main-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 50 gives the first full ~800 MB rsync upload headroom; later deploys transfer
    # only the changed files (delta sync) and finish well under the cap.
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - name: Setup Node (24)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python deps (frozen lock)
        run: uv sync --frozen

      # Re-run the full local/PR gate on the deploy path. Branch protection
      # should already enforce this, but the deploy job is the last line — a
      # bypass-merged red PR must not reach the host. `verify` also builds
      # `dist/`, so deploy uses that one build.
      - name: Verify (full local gate)
        run: npm run verify

      - name: Verify build produced HTML
        run: |
          html_count=$(find dist -name '*.html' | wc -l)
          if [ "$html_count" -lt 1 ]; then
            echo "::error::Astro build produced no HTML pages; refusing to deploy an empty site."
            exit 1
          fi
          echo "ok: $html_count html files in dist/"

      - name: Mark deploy gate
        id: deploy_gate
        run: echo "ready=true" >> "$GITHUB_OUTPUT"

      # ── Deploy to primary host via rsync over SSH ───────────────────────
      # `-c`: match by checksum, not mtime (rebuilds churn mtimes). No `-p`/`D`-chmod:
      # the docroot is root-owned, so perms go on files we own (F644), not the dir tree.
      # EXCLUDE `/.*` keeps `--delete` off ALL top-level remote dotfiles/dirs the
      # build doesn't own — `.well-known/` (ACME/TLS), `.ssh/`, panel files. The apex
      # redirect is baked into `dist/index.html`, so no dotfile needs to ship.
      - name: Deploy to primary host via rsync
        id: deploy_rsync
        if: ${{ !cancelled() && steps.deploy_gate.outputs.ready == 'true' }}
        continue-on-error: true
        uses: easingthemes/ssh-deploy@5d8aeab1a56041e269567e67a08ce00df324a617 # v6.0.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.HOSTING_SSH_KEY }}
          REMOTE_HOST: ${{ vars.HOSTING_SSH_HOST }}
          REMOTE_USER: ${{ secrets.HOSTING_SSH_USER }}
          REMOTE_PORT: ${{ vars.HOSTING_SSH_PORT || '22' }}
          SOURCE: "dist/"
          TARGET: ${{ vars.HOSTING_SSH_PATH }}
          ARGS: "-rlzc -i --delete --omit-dir-times --chmod=F644"
          EXCLUDE: "/.*"

      - name: Deploy to Cloudflare Pages
        id: deploy_cloudflare
        if: ${{ !cancelled() && steps.deploy_gate.outputs.ready == 'true' }}
        continue-on-error: true
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT }} --branch=main

      - name: Report deploy outcome
        if: >-
          ${{
            !cancelled()
            && steps.deploy_gate.outputs.ready == 'true'
            && (
              steps.deploy_rsync.outcome == 'failure'
              || steps.deploy_cloudflare.outcome == 'failure'
            )
          }}
        run: |
          echo "::error::At least one deploy target failed (rsync=${{ steps.deploy_rsync.outcome }}, cloudflare=${{ steps.deploy_cloudflare.outcome }})."
          exit 1
