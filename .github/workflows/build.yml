name: Build and smoke

# Phase 6 verification gate. Runs on every push and pull request: type-check,
# build, then a Playwright smoke against `npm run preview`.
#
# IMPORTANT: this workflow installs Node + uv only. It MUST NOT install pandoc
# or typst — the build pipeline copies committed PDFs/EPUBs from `src/content/`
# at build time, so CI never renders documents (see docs/downloads.md).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Run one build per ref at a time; cancel superseded runs on the same branch.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - name: Setup Node (24)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install uv
        # Pinned by SHA on the deploy workflow; matched here so both pipelines
        # use the same Python build runner.
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install npm dependencies
        run: npm ci

      - name: Type-check (astro check)
        run: npm run check

      - name: Build site (Astro + bulk archive + Pagefind)
        run: npm run build

      - name: Install Playwright browser (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
