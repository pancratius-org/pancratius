name: PR verify

# Pull-request quality gate. Runs the same `npm run verify` that maintainers
# run locally (npm audit + JS/TS tooling checks + Astro check + Python checks
# + audit core + audit selftest + build + audit:post-build), then
# Playwright e2e tests against the freshly built `dist/`.
#
# `verify` is the contract from docs/tooling.md; CI mirrors it so "passes
# locally" and "passes in CI" mean the same thing. One place to edit when a
# new gate is added.
#
# IMPORTANT: this workflow installs Node + uv only. It MUST NOT install pandoc
# or typst — the build pipeline copies committed PDFs/EPUBs from `src/content/`
# at build time, so CI never renders documents (see docs/downloads.md).

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - name: Setup Node (24)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python deps (frozen lock)
        run: uv sync --frozen

      - name: Verify (full local gate)
        # Single command on purpose: `verify` is the documented quality gate
        # (docs/tooling.md). Step labels are sacrificed for SSOT — the failing
        # sub-command surfaces in the log on failure.
        run: npm run verify

      - name: Install Playwright browser (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
