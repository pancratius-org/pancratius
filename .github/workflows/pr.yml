name: PR verify

# Pull-request quality gate: `npm run verify` — the single gate from
# docs/tooling.md (checks, audits, build, Playwright e2e). CI runs the exact
# command maintainers run locally, so "passes locally" == "passes in CI".
#
# Installs Node, uv, and the Playwright chromium browser (verify runs e2e). It
# MUST NOT install pandoc or typst — the build copies committed PDFs/EPUBs from
# `src/content/`, so CI never renders documents (see docs/downloads.md).

on:
  pull_request:
  workflow_dispatch:

# Least privilege: this job only checks out and runs the gate — read is enough.
permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          lfs: false

      - name: Setup Node (24)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python deps (frozen lock)
        run: uv sync --frozen

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Verify (the gate — checks, audits, build, e2e)
        run: npm run verify

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
