name: PR verify

# Pull-request quality gate: `npm run verify` — the single gate from
# docs/tooling.md (checks, audits, build, Playwright e2e). CI runs the exact
# command maintainers run locally, so "passes locally" == "passes in CI".
#
# Installs Node, uv, and the Playwright chromium browser (verify runs e2e). It
# MUST NOT install pandoc or typst — the build copies committed PDFs/EPUBs from
# `src/content/`, so CI never renders documents (see docs/downloads.md).

on:
  pull_request:
  workflow_dispatch:

# Least privilege: this job only checks out and runs the gate — read is enough.
permissions:
  contents: read

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6
        with:
          lfs: false

      - name: Setup Node (24)
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Install npm dependencies
        run: npm ci

      - name: Install Python deps (frozen lock)
        run: uv sync --frozen

      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: Verify (the gate — checks, audits, build, e2e)
        run: npm run verify

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
